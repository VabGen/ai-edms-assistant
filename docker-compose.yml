version: "3.9"

networks:
  edms-network:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  qdrantdata:
  grafanadata:
  prometheusdata:
  ollamadata:

services:

  # ──────────────────────────────────────────────────
  # PostgreSQL
  # ──────────────────────────────────────────────────
  postgres:
    image: postgres:18-alpine
    container_name: edms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-edms}
      POSTGRES_USER: ${POSTGRES_USER:-edms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-edms} -d ${POSTGRES_DB:-edms}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - edms-network

  # ──────────────────────────────────────────────────
  # Redis
  # ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: edms-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
    volumes:
      - redisdata:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - edms-network

  # ──────────────────────────────────────────────────
  # Qdrant — Векторная БД
  # ──────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: edms-qdrant
    restart: unless-stopped
    environment:
      QDRANT__LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - qdrantdata:/qdrant/storage
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "6334:6334"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6333/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - edms-network

  # ──────────────────────────────────────────────────
  # Ollama — локальный LLM сервер
  # Используется вместо Anthropic API
  # Модель: gpt-oss:120b-cloud (или любая Ollama-совместимая)
  # ──────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: edms-ollama
    restart: unless-stopped
    volumes:
      - ollamadata:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:11434/api/version || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    # Раскомментируйте если есть GPU:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    networks:
      - edms-network

  # ──────────────────────────────────────────────────
  # MCP Server
  # ──────────────────────────────────────────────────
  mcp-server:
    build:
      context: edms_ai_assistant/mcp_server
      dockerfile: Dockerfile
    container_name: edms-mcp_server
    restart: unless-stopped
    environment:
      EDMS_BASE_URL: ${EDMS_BASE_URL:-http://host.docker.internal:8098}
      EDMS_API_KEY: ${EDMS_API_KEY:-}
      MCP_HOST: 0.0.0.0
      MCP_PORT: ${MCP_PORT:-8001}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "${MCP_PORT:-8001}:8001"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:${MCP_PORT:-8001}/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - edms-network

  # ──────────────────────────────────────────────────
  # Orchestrator
  # Использует Ollama для LLM вместо Anthropic
  # ──────────────────────────────────────────────────
  orchestrator:
    build:
      context: ./edms_ai_assistant/orchestrator
      dockerfile: Dockerfile
    container_name: edms-orchestrator
    restart: unless-stopped
    depends_on:
      mcp-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      # ── LLM (Ollama) ──────────────────────────────
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OLLAMA_BASE_URL: http://ollama:11434
      MODEL_NAME: ${MODEL_NAME:-gpt-oss:120b-cloud}
      MODEL_PLANNER: ${MODEL_PLANNER:-gpt-oss:120b-cloud}
      MODEL_RESEARCHER: ${MODEL_RESEARCHER:-gpt-oss:120b-cloud}
      MODEL_EXECUTOR: ${MODEL_EXECUTOR:-gpt-oss:120b-cloud}
      MODEL_REVIEWER: ${MODEL_REVIEWER:-gpt-oss:120b-cloud}
      MODEL_EXPLAINER: ${MODEL_EXPLAINER:-gpt-oss:120b-cloud}
      LLM_GENERATIVE_URL: http://ollama:11434
      LLM_GENERATIVE_MODEL: ${MODEL_NAME:-gpt-oss:120b-cloud}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.6}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-4096}
      LLM_TIMEOUT: ${LLM_TIMEOUT:-120}
      # ── MCP ───────────────────────────────────────
      MCP_URL: http://mcp-server:${MCP_PORT:-8001}
      # ── Database ──────────────────────────────────
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-edms}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-edms_ai}
      CHECKPOINT_DB_URL: postgresql+asyncpg://${POSTGRES_USER:-edms}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-edms_ai}
      # ── Redis ─────────────────────────────────────
      REDIS_URL: redis://redis:6379/0
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS:-300}
      # ── Qdrant ────────────────────────────────────
      QDRANT_URL: http://qdrant:${QDRANT_PORT:-6333}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      # ── Embedding ─────────────────────────────────
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-paraphrase-multilingual-MiniLM-L12-v2}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-384}
      FAISS_INDEX_PATH: /tmp/edms_rag_faiss.pkl
      # ── App ───────────────────────────────────────
      API_PORT: ${API_PORT:-8000}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      RELOAD: "false"
      ENVIRONMENT: ${ENVIRONMENT:-production}
      MAX_SHORT_TERM_TOKENS: ${MEMORY_SHORT_TERM_MAX_TOKENS:-8000}
      # ── Agent ─────────────────────────────────────
      AGENT_MAX_ITERATIONS: ${AGENT_MAX_ITERATIONS:-10}
      AGENT_TIMEOUT: ${AGENT_TIMEOUT:-120.0}
      AGENT_MAX_CONTEXT_MESSAGES: ${AGENT_MAX_CONTEXT_MESSAGES:-20}
      # ── Security ──────────────────────────────────
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./edms_ai_assistant/orchestrator/prompts:/app/prompts:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:${API_PORT:-8000}/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 90s
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - edms-network

  # ──────────────────────────────────────────────────
  # Feedback Collector
  # ──────────────────────────────────────────────────
  feedback-collector:
    build:
      context: ./edms_ai_assistant/feedback-collector
      dockerfile: Dockerfile
    container_name: edms-feedback
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      orchestrator:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-edms}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-edms_ai}
      ORCHESTRATOR_URL: http://orchestrator:${API_PORT:-8000}
      REDIS_URL: redis://redis:6379/0
      FEEDBACK_PORT: ${FEEDBACK_PORT:-8002}
      RAG_UPDATE_HOUR: ${RAG_UPDATE_HOUR:-3}
      RAG_UPDATE_MINUTE: ${RAG_UPDATE_MINUTE:-0}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "${FEEDBACK_PORT:-8002}:8002"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:${FEEDBACK_PORT:-8002}/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - edms-network

  # ──────────────────────────────────────────────────
  # Prometheus
  # ──────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: edms-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    volumes:
      - ./edms_ai_assistant/infrastructure/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheusdata:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - edms-network

  # ──────────────────────────────────────────────────
  # Grafana
  # ──────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: edms-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-change-me}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:${GRAFANA_PORT:-3000}
    volumes:
      - grafanadata:/var/lib/grafana
      - ./edms_ai_assistant/infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/api/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - edms-network