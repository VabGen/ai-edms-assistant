version: "3.9"

networks:
  edms-network:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  qdrantdata:
  grafanadata:
  prometheusdata:
  ollamadata:

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:18-alpine
    container_name: edms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-edms}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-1234}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-edms}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - edms-network

  # ── Redis ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: edms-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
    volumes:
      - redisdata:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - edms-network

  # ── Qdrant ──────────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: edms-qdrant
    restart: unless-stopped
    volumes:
      - qdrantdata:/qdrant/storage
    ports:
      - "${QDRANT_PORT:-6333}:6333"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6333/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - edms-network

  # ── Ollama ──────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: edms-ollama
    restart: unless-stopped
    volumes:
      - ollamadata:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:11434/api/version || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - edms-network

  # ── Orchestrator (включает MCP и всё приложение) ────────────────────────
  # Монорепо: один образ, разные точки запуска
  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: edms-orchestrator
    restart: unless-stopped
    command: >
      sh -c "
        python -m alembic -c edms_ai_assistant/orchestrator/alembic.ini upgrade head &&
        uvicorn edms_ai_assistant.orchestrator.main:app
          --host 0.0.0.0
          --port ${API_PORT:-8000}
          --workers ${ORCHESTRATOR_WORKERS:-1}
          --log-level info
          --no-access-log
      "
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      # ── LLM ─────────────────────────────────────────────────────────
      OLLAMA_BASE_URL: http://ollama:11434
      MODEL_NAME: ${MODEL_NAME:-gpt-oss:120b-cloud}
      MODEL_PLANNER: ${MODEL_PLANNER:-gpt-oss:120b-cloud}
      MODEL_RESEARCHER: ${MODEL_RESEARCHER:-gpt-oss:120b-cloud}
      MODEL_EXECUTOR: ${MODEL_EXECUTOR:-gpt-oss:120b-cloud}
      MODEL_REVIEWER: ${MODEL_REVIEWER:-gpt-oss:120b-cloud}
      MODEL_EXPLAINER: ${MODEL_EXPLAINER:-gpt-oss:120b-cloud}
      LLM_GENERATIVE_URL: http://ollama:11434
      LLM_GENERATIVE_MODEL: ${MODEL_NAME:-gpt-oss:120b-cloud}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.6}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-2048}
      LLM_TIMEOUT: ${LLM_TIMEOUT:-120}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # ── EDMS ────────────────────────────────────────────────────────
      EDMS_BASE_URL: ${EDMS_BASE_URL:-http://host.docker.internal:8098}
      # ── Database ────────────────────────────────────────────────────
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-1234}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-edms}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-1234}@postgres:5432/${POSTGRES_DB:-edms}
      CHECKPOINT_DB_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-1234}@postgres:5432/${POSTGRES_DB:-edms}
      # ── Redis ────────────────────────────────────────────────────────
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379/0
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS:-3600}
      CACHE_TTL_READ: ${CACHE_TTL_READ:-300}
      # ── Qdrant ───────────────────────────────────────────────────────
      QDRANT_URL: http://qdrant:${QDRANT_PORT:-6333}
      # ── MCP (внутри того же контейнера — localhost) ─────────────────
      MCP_URL: http://localhost:${MCP_PORT:-8001}
      MCP_PORT: ${MCP_PORT:-8001}
      # ── App ──────────────────────────────────────────────────────────
      API_PORT: ${API_PORT:-8000}
      FEEDBACK_PORT: ${FEEDBACK_PORT:-8002}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      AGENT_MAX_ITERATIONS: ${AGENT_MAX_ITERATIONS:-10}
      AGENT_TIMEOUT: ${AGENT_TIMEOUT:-120.0}
      AGENT_MAX_CONTEXT_MESSAGES: ${AGENT_MAX_CONTEXT_MESSAGES:-20}
      ORCHESTRATOR_URL: http://orchestrator:${API_PORT:-8000}
      FEEDBACK_API_URL: http://feedback-collector:${FEEDBACK_PORT:-8002}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./prompts:/app/edms_ai_assistant/orchestrator/prompts:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:${API_PORT:-8000}/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 90s
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - edms-network

  # ── MCP Server ──────────────────────────────────────────────────────────
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: edms-mcp-server
    restart: unless-stopped
    command: >
      uvicorn edms_ai_assistant.mcp_server.run_server:app
        --host 0.0.0.0
        --port ${MCP_PORT:-8001}
        --log-level info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      MODEL_NAME: ${MODEL_NAME:-gpt-oss:120b-cloud}
      LLM_GENERATIVE_URL: http://ollama:11434
      LLM_GENERATIVE_MODEL: ${MODEL_NAME:-gpt-oss:120b-cloud}
      EDMS_BASE_URL: ${EDMS_BASE_URL:-http://host.docker.internal:8098}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-1234}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-edms}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-1234}@postgres:5432/${POSTGRES_DB:-edms}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379/0
      MCP_HOST: 0.0.0.0
      MCP_PORT: ${MCP_PORT:-8001}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "${MCP_PORT:-8001}:8001"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:${MCP_PORT:-8001}/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - edms-network

  # ── Feedback Collector ──────────────────────────────────────────────────
  feedback-collector:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: edms-feedback
    restart: unless-stopped
    command: >
      uvicorn edms_ai_assistant.feedback_collector.feedback_api:app
        --host 0.0.0.0
        --port ${FEEDBACK_PORT:-8002}
        --log-level info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      orchestrator:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-1234}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-edms}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-1234}@postgres:5432/${POSTGRES_DB:-edms}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379/0
      ORCHESTRATOR_URL: http://orchestrator:${API_PORT:-8000}
      FEEDBACK_PORT: ${FEEDBACK_PORT:-8002}
      RAG_UPDATE_HOUR: ${RAG_UPDATE_HOUR:-3}
      RAG_UPDATE_MINUTE: ${RAG_UPDATE_MINUTE:-0}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "${FEEDBACK_PORT:-8002}:8002"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:${FEEDBACK_PORT:-8002}/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - edms-network

  # ── Prometheus ──────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: edms-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    volumes:
      - ./infrastructure/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheusdata:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - edms-network

  # ── Grafana ─────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: edms-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-change-me}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafanadata:/var/lib/grafana
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    networks:
      - edms-network