version: "3.9"

services:

  postgres:
    image: pgvector/pgvector:pg16
    container_name: edms_ai_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-edms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-edms_secret}
      POSTGRES_DB: ${POSTGRES_DB:-edms_ai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-edms} -d ${POSTGRES_DB:-edms_ai}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: edms_ai_redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mcp-server:
    build: ./mcp-server
    container_name: edms_mcp_server
    environment:
      EDMS_API_URL: ${EDMS_API_URL:-http://host.docker.internal:8098}
      EDMS_API_KEY: ${EDMS_API_KEY:-}
      EDMS_TIMEOUT: ${EDMS_TIMEOUT:-30}
      MCP_HTTP_PORT: 8001
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  orchestrator:
    build: ./orchestrator
    container_name: edms_orchestrator
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mcp-server:
        condition: service_healthy
    environment:
      # LLM
      LLM_LIGHT_URL: ${LLM_LIGHT_URL:-http://host.docker.internal:11434/v1}
      LLM_LIGHT_MODEL: ${LLM_LIGHT_MODEL:-llama3.2:3b}
      LLM_HEAVY_URL: ${LLM_HEAVY_URL:-http://host.docker.internal:11434/v1}
      LLM_HEAVY_MODEL: ${LLM_HEAVY_MODEL:-gpt-oss:120b-cloud}
      LLM_API_KEY: ${LLM_API_KEY:-ollama}
      LLM_EMBEDDING_URL: ${LLM_EMBEDDING_URL:-http://host.docker.internal:11434}
      LLM_EMBEDDING_MODEL: ${LLM_EMBEDDING_MODEL:-nomic-embed-text}
      # MCP
      MCP_SERVER_URL: http://mcp-server:8001
      # DB
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-edms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-edms_secret}
      POSTGRES_DB: ${POSTGRES_DB:-edms_ai}
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379/0
      # App
      API_PORT: 8002
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      COMPLEXITY_THRESHOLD: ${COMPLEXITY_THRESHOLD:-0.7}
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  feedback:
    build: ./feedback-collector
    container_name: edms_feedback
    depends_on:
      orchestrator:
        condition: service_healthy
    environment:
      ORCHESTRATOR_URL: http://orchestrator:8002
      FEEDBACK_PORT: 8003
      RAG_REBUILD_INTERVAL_HOURS: ${RAG_REBUILD_INTERVAL_HOURS:-24}
    ports:
      - "8003:8003"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: edms_prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: edms_grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana_datasource.yml:/etc/grafana/provisioning/datasources/prometheus.yml:ro
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  grafana_data:
