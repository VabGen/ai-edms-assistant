version: "3.9"

services:
  # ── PostgreSQL + pgvector ─────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: edms_ai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-edms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-edms_secret}
      POSTGRES_DB: ${POSTGRES_DB:-edms_ai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docs/init_db.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-edms} -d ${POSTGRES_DB:-edms_ai}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - edms_net

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: edms_ai_redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - edms_net

  # ── MCP Server ────────────────────────────────────────────────────────────
  mcp-server:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    container_name: edms_mcp_server
    restart: unless-stopped
    environment:
      EDMS_API_URL: ${EDMS_API_URL:-http://host.docker.internal:8098}
      EDMS_API_KEY: ${EDMS_API_KEY:-}
      EDMS_TIMEOUT: ${EDMS_TIMEOUT:-30}
      MCP_PORT: 8001
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "${MCP_PORT:-8001}:8001"
    volumes:
      - mcp_logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - edms_net

  # ── Orchestrator ──────────────────────────────────────────────────────────
  orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    container_name: edms_orchestrator
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mcp-server:
        condition: service_healthy
    environment:
      # LLM — лёгкая модель
      LLM_LIGHT_URL: ${LLM_LIGHT_URL:-http://host.docker.internal:11434/v1}
      LLM_LIGHT_MODEL: ${LLM_LIGHT_MODEL:-llama3.2:3b}
      # LLM — тяжёлая модель
      LLM_HEAVY_URL: ${LLM_HEAVY_URL:-http://host.docker.internal:11434/v1}
      LLM_HEAVY_MODEL: ${LLM_HEAVY_MODEL:-gpt-oss:120b-cloud}
      # Опциональные внешние LLM
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # Эмбеддинги (для RAG)
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      LLM_EMBEDDING_URL: ${LLM_EMBEDDING_URL:-http://host.docker.internal:11434}
      LLM_EMBEDDING_MODEL: ${LLM_EMBEDDING_MODEL:-nomic-embed-text}
      # MCP
      MCP_SERVER_URL: http://mcp-server:8001
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-edms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-edms_secret}
      POSTGRES_DB: ${POSTGRES_DB:-edms_ai}
      # Storage
      DATABASE_URL: postgresql://${POSTGRES_USER:-edms}:${POSTGRES_PASSWORD:-edms_secret}@postgres:5432/${POSTGRES_DB:-edms_ai}
      REDIS_URL: redis://redis:6379
      # API
      API_PORT: 8002
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
      # Agent
      MAX_REACT_ITERATIONS: ${MAX_REACT_ITERATIONS:-8}
      REQUEST_TIMEOUT: ${REQUEST_TIMEOUT:-60}
      COMPLEXITY_THRESHOLD: ${COMPLEXITY_THRESHOLD:-0.7}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PROMPTS_DIR: /app/prompts
    ports:
      - "${ORCHESTRATOR_PORT:-8002}:8002"
    volumes:
      - ./orchestrator/prompts:/app/prompts:ro
      - ./docs:/app/db_init_sql:ro
      - orchestrator_logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8002/health"]
      interval: 15s
      timeout: 10s
      retries: 5
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - edms_net

  # ── Feedback Collector ────────────────────────────────────────────────────
  feedback-collector:
    build:
      context: ./feedback-collector
      dockerfile: Dockerfile
    container_name: edms_feedback
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      orchestrator:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-edms}:${POSTGRES_PASSWORD:-edms_secret}@postgres:5432/${POSTGRES_DB:-edms_ai}
      ORCHESTRATOR_URL: http://orchestrator:8002
      FEEDBACK_PORT: 8003
      RAG_REBUILD_INTERVAL_HOURS: ${RAG_REBUILD_INTERVAL_HOURS:-24}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "${FEEDBACK_PORT:-8003}:8003"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8003/health"]
      interval: 20s
      timeout: 5s
      retries: 3
    networks:
      - edms_net

  # ── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: edms_prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - edms_net

  # ── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: edms_grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:${GRAFANA_PORT:-3001}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana_datasource.yml:/etc/grafana/provisioning/datasources/prometheus.yml:ro
      - ./monitoring/grafana_dashboards.json:/etc/grafana/provisioning/dashboards/provider.json:ro
      - ./monitoring/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    networks:
      - edms_net

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  mcp_logs:
  orchestrator_logs:

networks:
  edms_net:
    driver: bridge
